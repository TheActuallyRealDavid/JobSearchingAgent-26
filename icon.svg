<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="clip">
      <polygon points="80,0 944,0 1024,80 1024,944 944,1024 80,1024 0,944 0,80"/>
    </clipPath>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a24"/>
      <stop offset="1" stop-color="#07070c"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#fff27a"/>
      <stop offset="0.3" stop-color="#ffe500"/>
      <stop offset="1" stop-color="#e6ba00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Dark background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle grid -->
    <g stroke="#ffe500" stroke-width="1" opacity="0.06">
      <line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="768" x2="1024" y2="768"/>
      <line x1="256" y1="0" x2="256" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="768" y1="0" x2="768" y2="1024"/>
    </g>

    <!-- Corner accent slashes -->
    <polygon points="0,0 200,0 80,120 0,120" fill="#ffe500" opacity="0.85"/>
    <polygon points="1024,1024 824,1024 944,904 1024,904" fill="#ffe500" opacity="0.85"/>

    <!-- Glow behind main shape -->
    <g filter="url(#glow)" opacity="0.5">
      <polygon points="512,220 720,420 620,520 512,412 404,520 304,420" fill="#ffe500"/>
    </g>

    <!-- Main shape: stacked angular chevrons pointing up -->
    <g fill="url(#yellowGrad)">
      <!-- Top chevron -->
      <polygon points="512,200 740,428 640,528 512,400 384,528 284,428"/>
      <!-- Middle chevron -->
      <polygon points="512,380 740,608 640,708 512,580 384,708 284,608" opacity="0.85"/>
      <!-- Bottom chevron -->
      <polygon points="512,560 740,788 640,888 512,760 384,888 284,788" opacity="0.55"/>
    </g>

    <!-- Yellow border frame -->
    <polygon points="80,0 944,0 1024,80 1024,944 944,1024 80,1024 0,944 0,80"
             fill="none" stroke="#ffe500" stroke-width="14" opacity="0.65"/>
  </g>
</svg>
